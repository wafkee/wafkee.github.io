<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8" />
  <title>rustynes</title>
  <style>
    html,
    body {
      min-height: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      transform: scale3d(2, 2, 1);
      transform-origin: 0 0;
    }

    .nes {
      width: 512px;
      height: 480px;
    }

    .select {
      margin-left: 16px;
    }

    .key {
      margin: 16px 0 0 16px;
    }
  </style>
</head>

<body>
  <div id="dropzone">
    <div class="nes">
      <canvas></canvas>
    </div>
    <div class="select">
      <select name="rom">
        
        <option value="hello">Super Mario Bros</option>
        <option value="nestest">Super mario Bros 3</option>
      </select>
    </div>
  </div>
  <div class="key">
    <span>Key pad</span>
    <ul>
      <li>X A</li>
      <li>Z B</li>
      <li>A SELECT</li>
      <li>S START</li>
      <li>↑ ↑</li>
      <li>↓ ↓</li>
      <li>← ←</li>
      <li>→ →</li>
    </ul>
  </div>
  <script type="module" src="./pulse.js"></script>
  <script type="module" src="./oscillator.js"></script>
  <script type="module" src="./noise.js"></script>
  <script type="module" src="./main.js"></script>
  <script type="module" src="./init.js"></script>
  <script type="module">
    import {start, startFile} from './main.js';
    document.querySelector('select')
      .addEventListener('change', (e) => {
        start(`./roms/${e.target.value}.nes`);
      })

    if (window.FileReader) {
      const dropzone = document.querySelector('#dropzone');
      dropzone.addEventListener('dragover', (event) => {
        event.stopPropagation();
        event.preventDefault();
        event.dataTransfer.dropEffect = 'copy';
      }, false);
      dropzone.addEventListener('drop', (event) => {
        event.stopPropagation();
        event.preventDefault();
        const files = event.dataTransfer.files;
        if (files.length <= 0)
          return;
        startFile(files[0]);
      }, false);
    }
  </script>
</body>

</html>
